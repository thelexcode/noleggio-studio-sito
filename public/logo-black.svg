<svg viewBox="0 0 280 120" fill="none" xmlns="http://www.w3.org/2000/svg" width="1120" height="480" style="overflow: visible;">
  <defs>
    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" floodOpacity="0.3" runButt="true"/>
    </filter>

    <linearGradient id="metal-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#E0E0E0" />
      <stop offset="50%" stopColor="#B0B0B0" />
      <stop offset="100%" stopColor="#E0E0E0" />
    </linearGradient>

    <linearGradient id="red-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#FF4D4D" />
      <stop offset="100%" stopColor="#CC0000" />
    </linearGradient>
  </defs>

  <g stroke="#454545" stroke-width="4" stroke-linecap="round">
    <path d="M 10,35 V 10 H 35" />
    <path d="M 245,10 H 270 V 35" />
    <path d="M 270,85 V 110 H 245" />
    <path d="M 35,110 H 10 V 85" />
  </g>

  <g transform="translate(20, 10)">
    <rect x="50" y="15" width="140" height="50" rx="25" stroke="#A0A0A0" stroke-width="4" fill="none" filter="url(#drop-shadow)" />
    
    <text x="120" y="52" text-anchor="middle" font-size="36" font-weight="900" font-family="Arial, sans-serif" fill="url(#metal-gradient)" filter="url(#drop-shadow)" style="letter-spacing: 2px">HD</text>

    <text x="120" y="85" text-anchor="middle" font-size="16" font-weight="bold" font-family="Arial, sans-serif" fill="#454545" style="letter-spacing: 4px">STUDIO</text>

    <circle cx="50" cy="40" r="28" fill="url(#red-gradient)" filter="url(#drop-shadow)" />

    <path d="M 42,28 L 62,40 L 42,52 Z" fill="white" transform="translate(4, 0)" />

    <text x="50" y="85" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial, sans-serif" fill="#454545" style="letter-spacing: 2px">REC</text>
  </g>
</svg>
